<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DnD Table Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;cursor:none}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000}
#splash{position:absolute;inset:0;z-index:1}
#media-layer{position:absolute;inset:0;z-index:2;display:none;background:#000}
#media-layer video,#media-layer img{
  position:absolute;width:100%;height:100%;object-fit:contain;background:#000}
#grid-canvas{position:absolute;inset:0;z-index:3;pointer-events:none;display:none}
#overscan-canvas{position:absolute;inset:0;z-index:4;pointer-events:none;display:none}

/* Connection indicator */
#conn{position:fixed;top:8px;right:8px;width:10px;height:10px;border-radius:50%;
  background:#a83232;z-index:10;transition:background 0.3s}
#conn.ok{background:#4a8a3a}
</style>
</head>
<body>

<canvas id="splash"></canvas>
<div id="media-layer">
  <video id="vid" autoplay loop playsinline preload="auto"></video>
  <img id="img" style="display:none">
</div>
<canvas id="grid-canvas"></canvas>
<canvas id="overscan-canvas"></canvas>
<div id="conn"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   D20 SPLASH SCREEN (icosahedron)
   ═══════════════════════════════════════════════════════════════ */

var PHI = (1 + Math.sqrt(5)) / 2;
var NORM = Math.sqrt(1 + PHI * PHI);
var VERTS = [
  [-1, PHI, 0],[1, PHI, 0],[-1,-PHI, 0],[1,-PHI, 0],
  [0,-1, PHI],[0, 1, PHI],[0,-1,-PHI],[0, 1,-PHI],
  [PHI, 0,-1],[PHI, 0, 1],[-PHI, 0,-1],[-PHI, 0, 1]
].map(function(v){return [v[0]/NORM, v[1]/NORM, v[2]/NORM]});

var FACES = [
  [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
  [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
  [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
  [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]
];

var GOLD_B = [209,173,79];   /* bright */
var GOLD_M = [153,122,51];   /* mid */
var GOLD_D = [89,71,31];     /* dark */
var BG_RGB = [20,18,15];

var angleY = 0, angleX = 0;

/* ─── Rune state ─────────────────────────────────────────────────
   faceVisible[i] — was face i visible last frame?
   faceRunes[i]   — index into RUNE_STROKES, or -1 if unassigned.
   A rune is picked the moment a face flips visible → hidden clears it.  */
var faceVisible = new Array(20).fill(false);
var faceRunes   = new Array(20).fill(-1);

/* Fixed 3D rune scale: rune coord ±1 = 22% of one icosahedron edge in world space.
   Inradius of a face = edge/(2√3) ≈ 28.9% of edge; 22% gives ~76% fill with margin.
   Using a constant 3D size means proj() applies foreshortening exactly once —
   the same way it affects the face geometry — so rune and triangle always match. */
var RUNE_3D = 2/NORM * 0.22;  /* 2/NORM = icosahedron edge length on a unit sphere */

/* ─── Elder Futhark — 24 runes as canvas polyline sequences ──────
   Coordinate space: x ∈ [-0.5, 0.5], y ∈ [-1, 1]  (y+ = up).
   Each rune is an array of strokes; each stroke is [[x,y], …].         */
var RUNE_STROKES = [
  /* 0  Fehu    ᚠ  staff + 2 right branches                */ [[[0,1],[0,-1]],[[0,.5],[.5,.1]],[[0,0],[.5,-.4]]],
  /* 1  Uruz    ᚢ  left tall, right short, diagonal bridge */ [[[-0.3,1],[-0.3,-1]],[[.3,.3],[.3,-1]],[[-0.3,1],[.3,.3]]],
  /* 2  Thurisaz ᚦ staff + rightward thorn                 */ [[[0,1],[0,-1]],[[0,.6],[.5,.1],[0,-.4]]],
  /* 3  Ansuz   ᚨ  staff + 2 left branches                 */ [[[0,1],[0,-1]],[[0,.6],[-.5,.1]],[[0,.1],[-.5,-.4]]],
  /* 4  Raidho  ᚱ  staff + P-loop + lower diagonal         */ [[[0,1],[0,-1]],[[0,1],[.5,.5],[.5,0],[0,0]],[[0,0],[.5,-.7]]],
  /* 5  Kenaz   ᚲ  staff + single lower-right branch       */ [[[0,1],[0,-1]],[[0,-.2],[.5,-.8]]],
  /* 6  Gebo    ᚷ  X cross                                 */ [[[-0.45,.9],[.45,-.9]],[[-0.45,-.9],[.45,.9]]],
  /* 7  Wunjo   ᚹ  staff + upper-right pennant             */ [[[0,1],[0,-1]],[[0,1],[.5,.5],[0,0]]],
  /* 8  Hagalaz ᚺ  two staffs + diagonal crossbar          */ [[[-0.3,1],[-0.3,-1]],[[.3,1],[.3,-1]],[[-0.3,.3],[.3,-.3]]],
  /* 9  Nauthiz ᚾ  staff + crossing diagonal (need-fire)   */ [[[0,1],[0,-1]],[[.4,.7],[-.4,-.7]]],
  /* 10 Isaz    ᛁ  single vertical staff                   */ [[[0,1],[0,-1]]],
  /* 11 Jera    ᛃ  two offset chevrons (year cycle)        */ [[[-0.3,.9],[.3,.4],[-0.3,.1]],[[.3,-.1],[-.3,-.5],[.3,-.9]]],
  /* 12 Eihwaz  ᛇ  staff + opposing diagonal extensions   */ [[[0,1],[0,-1]],[[0,.7],[.4,.3]],[[0,-.7],[-.4,-.3]]],
  /* 13 Perthro ᛈ  staff + lower-right open cup            */ [[[0,1],[0,-1]],[[0,.1],[.5,.1],[.5,-.8],[0,-.8]]],
  /* 14 Algiz   ᛉ  staff + upper fork (elk/protection)     */ [[[0,1],[0,-1]],[[0,.35],[.5,1]],[[0,.35],[-.5,1]]],
  /* 15 Sowilo  ᛊ  angular lightning-bolt S                */ [[[.4,1],[.4,.2],[-.4,-.2],[-.4,-1]]],
  /* 16 Tiwaz   ᛏ  upward arrow (Tyr's spear)              */ [[[0,1],[0,-1]],[[0,.5],[-.45,0]],[[0,.5],[.45,0]]],
  /* 17 Berkano ᛒ  staff + two right bumps (birch)         */ [[[0,1],[0,-1]],[[0,.95],[.45,.65],[.45,.15],[0,0]],[[0,0],[.45,-.3],[.45,-.7],[0,-.95]]],
  /* 18 Ehwaz   ᛖ  two staffs + center-V bridge (horse)   */ [[[-0.3,1],[-0.3,-1]],[[.3,1],[.3,-1]],[[-0.3,.5],[0,0],[.3,.5]]],
  /* 19 Mannaz  ᛗ  two staffs + inverted-V at top (man)   */ [[[-0.3,1],[-0.3,-1]],[[.3,1],[.3,-1]],[[-0.3,.9],[0,.2],[.3,.9]]],
  /* 20 Laguz   ᛚ  staff + lower-right rudder branch       */ [[[0,1],[0,-1]],[[0,-.2],[.45,-.85]]],
  /* 21 Ingwaz  ᛜ  diamond (seed/fertility)                */ [[[0,.95],[.45,0],[0,-.95],[-.45,0],[0,.95]]],
  /* 22 Dagaz   ᛞ  bowtie / hourglass (day)                */ [[[-0.45,.9],[.45,-.9],[-.45,-.9],[.45,.9],[-.45,.9]]],
  /* 23 Othala  ᛟ  diamond on two legs (heritage)          */ [[[0,.8],[.45,.1],[0,-.4],[-.45,.1],[0,.8]],[[-0.45,.1],[-.45,-1]],[[.45,.1],[.45,-1]]],
];

function rotY(verts, a){
  var c=Math.cos(a), s=Math.sin(a);
  return verts.map(function(v){return [v[0]*c+v[2]*s, v[1], -v[0]*s+v[2]*c]});
}
function rotX(verts, a){
  var c=Math.cos(a), s=Math.sin(a);
  return verts.map(function(v){return [v[0], v[1]*c-v[2]*s, v[1]*s+v[2]*c]});
}

function faceNorm(a,b,c){
  var ax=b[0]-a[0],ay=b[1]-a[1],az=b[2]-a[2];
  var bx=c[0]-a[0],by=c[1]-a[1],bz=c[2]-a[2];
  var nx=ay*bz-az*by, ny=az*bx-ax*bz, nz=ax*by-ay*bx;
  var l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
  return [nx/l,ny/l,nz/l];
}

function proj(x,y,z,sc,cx,cy){
  var f=4/(4+z); return [cx+x*sc*f, cy-y*sc*f];
}

function drawSplash(ctx, w, h){
  ctx.fillStyle='rgb('+BG_RGB.join(',')+')';
  ctx.fillRect(0,0,w,h);

  var sc = Math.min(w,h)*0.20;
  var cx = w/2, cy = h/2 - h*0.06;

  var v = rotX(VERTS, angleX);
  v = rotY(v, angleY);
  v = rotX(v, 0.4);

  var pr = v.map(function(p){return proj(p[0],p[1],p[2],sc,cx,cy)});

  /* Normalise light */
  var lx=0.3, ly=0.6, lz=0.8;
  var ll=Math.sqrt(lx*lx+ly*ly+lz*lz);
  lx/=ll; ly/=ll; lz/=ll;

  /* Build visible face list; assign/retire runes on visibility transitions */
  var faces = [];
  var nowVisible = new Array(20).fill(false);

  /* Pool of rune indices not currently in use — rebuilt fresh each frame so
     multiple faces turning visible in the same frame each get a distinct rune. */
  var available = [];
  for(var ri=0; ri<RUNE_STROKES.length; ri++){
    var inUse = false;
    for(var fi2=0; fi2<20; fi2++) if(faceRunes[fi2]===ri){ inUse=true; break; }
    if(!inUse) available.push(ri);
  }

  for(var fi=0; fi<FACES.length; fi++){
    var f=FACES[fi], i0=f[0], i1=f[1], i2=f[2];
    var n = faceNorm(v[i0], v[i1], v[i2]);
    if(n[2] > 0) continue;  /* back-face cull */
    nowVisible[fi] = true;

    /* Pick a unique rune the first frame this face becomes visible */
    if(!faceVisible[fi]){
      var pick = available.length > 0
        ? available.splice(Math.floor(Math.random() * available.length), 1)[0]
        : Math.floor(Math.random() * RUNE_STROKES.length);  /* fallback: all 24 in use */
      faceRunes[fi] = pick;
    }

    var avgZ = (v[i0][2]+v[i1][2]+v[i2][2])/3;
    var dot = n[0]*lx + n[1]*ly + n[2]*lz;
    dot = Math.max(0, Math.min(1, dot*0.5+0.5));

    var r = GOLD_D[0]+(GOLD_B[0]-GOLD_D[0])*dot;
    var g = GOLD_D[1]+(GOLD_B[1]-GOLD_D[1])*dot;
    var b = GOLD_D[2]+(GOLD_B[2]-GOLD_D[2])*dot;

    faces.push({z:avgZ, fi:fi, p:[pr[i0],pr[i1],pr[i2]], rgb:[r,g,b], dot:dot});
  }

  /* Retire runes for faces that just flipped hidden */
  for(var fi=0; fi<20; fi++){
    if(faceVisible[fi] && !nowVisible[fi]) faceRunes[fi] = -1;
    faceVisible[fi] = nowVisible[fi];
  }

  faces.sort(function(a,b){return b.z-a.z});  /* back-to-front (painter's algorithm) */

  for(var di=0; di<faces.length; di++){
    var fd=faces[di], p=fd.p;

    /* Face fill */
    ctx.beginPath();
    ctx.moveTo(p[0][0],p[0][1]);
    ctx.lineTo(p[1][0],p[1][1]);
    ctx.lineTo(p[2][0],p[2][1]);
    ctx.closePath();
    ctx.fillStyle='rgb('+Math.round(fd.rgb[0])+','+Math.round(fd.rgb[1])+','+Math.round(fd.rgb[2])+')';
    ctx.fill();

    /* Face edges */
    var ea = 0.3 + fd.dot*0.3;
    ctx.strokeStyle='rgba('+GOLD_B.join(',')+','+ea+')';
    ctx.lineWidth=1.2;
    ctx.lineCap='butt';
    ctx.lineJoin='miter';
    ctx.stroke();

    /* Rune — co-oriented with the face via a projected 3D local basis.
       Local X = first edge direction; Local Y = cross(normal, X).
       Both are projected to screen space so the rune inherits the face's
       rotation AND perspective foreshortening (carving effect).           */
    var ri = faceRunes[fd.fi];
    if(ri >= 0){
      /* 3D vertex indices for this face */
      var vi0=FACES[fd.fi][0], vi1=FACES[fd.fi][1], vi2=FACES[fd.fi][2];

      /* 3D centroid */
      var c3x=(v[vi0][0]+v[vi1][0]+v[vi2][0])/3;
      var c3y=(v[vi0][1]+v[vi1][1]+v[vi2][1])/3;
      var c3z=(v[vi0][2]+v[vi1][2]+v[vi2][2])/3;

      /* Local X: first edge of face, normalised */
      var ex2=v[vi1][0]-v[vi0][0], ey2=v[vi1][1]-v[vi0][1], ez2=v[vi1][2]-v[vi0][2];
      var el2=Math.sqrt(ex2*ex2+ey2*ey2+ez2*ez2); ex2/=el2; ey2/=el2; ez2/=el2;

      /* Local Y: cross(face_normal, local_X) — in face plane, ⊥ to X */
      var fn=faceNorm(v[vi0],v[vi1],v[vi2]);
      var ux2=fn[1]*ez2-fn[2]*ey2, uy2=fn[2]*ex2-fn[0]*ez2, uz2=fn[0]*ey2-fn[1]*ex2;

      /* Map a rune local coord (rx,ry) to a 3D point on the face surface,
         then project through the exact same pipeline as the triangle vertices.
         Every rune point gets its own 4/(4+z) factor — no approximation.   */
      var rp = function(rx, ry){
        return proj(
          c3x + (rx*ex2 + ry*ux2) * RUNE_3D,
          c3y + (rx*ey2 + ry*uy2) * RUNE_3D,
          c3z + (rx*ez2 + ry*uz2) * RUNE_3D,
          sc, cx, cy
        );
      };

      /* Line width: screen length of one RUNE_3D step along local Y */
      var lw0=rp(0,0), lw1=rp(0,1);
      var lw=Math.max(0.8, Math.sqrt((lw1[0]-lw0[0])*(lw1[0]-lw0[0])+(lw1[1]-lw0[1])*(lw1[1]-lw0[1]))*0.11);

      ctx.strokeStyle='rgba(255,242,160,0.82)';
      ctx.lineWidth=lw;
      ctx.lineCap='round';
      ctx.lineJoin='round';
      ctx.beginPath();
      var strokes=RUNE_STROKES[ri];
      for(var s=0; s<strokes.length; s++){
        var pts=strokes[s], q=rp(pts[0][0],pts[0][1]);
        ctx.moveTo(q[0],q[1]);
        for(var pp=1; pp<pts.length; pp++){q=rp(pts[pp][0],pts[pp][1]); ctx.lineTo(q[0],q[1]);}
      }
      ctx.stroke();
    }
  }

  /* Title */
  ctx.textAlign='center';
  var titleY = cy + sc*1.3;
  ctx.fillStyle='rgba('+GOLD_B.join(',')+',0.9)';
  ctx.font='bold '+Math.round(h*0.045)+'px Cinzel,serif';
  ctx.fillText('\u2694  DnD Table', cx, titleY);

  ctx.fillStyle='rgba('+GOLD_M.join(',')+',0.5)';
  ctx.font=Math.round(h*0.02)+'px sans-serif';
  ctx.fillText('dndtable.local:5000', cx, titleY + h*0.04);

  angleY += 0.012;
  angleX += 0.004;
}

/* ═══════════════════════════════════════════════════════════════
   GRID OVERLAY
   ═══════════════════════════════════════════════════════════════ */

var gridState = {enabled:false, type:'square', size:55, thickness:1,
  opacity:0.3, color:'#ffffff', offset_x:0, offset_y:0, calibration_mode:false};

var overscanState = {top:0, bottom:0, left:0, right:0, calibration:false};

function updateGridVisibility(){
  var show = gridState.enabled || gridState.calibration_mode;
  gridCanvas.style.display = show ? 'block' : 'none';
}

function drawGrid(ctx, w, h){
  updateGridVisibility();
  ctx.clearRect(0, 0, w, h);
  var g = gridState;
  if(!g.enabled && !g.calibration_mode) return;

  var hex = g.color || '#ffffff';
  var r = parseInt(hex.slice(1,3),16);
  var gn = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);

  ctx.strokeStyle = 'rgba('+r+','+gn+','+b+','+g.opacity+')';
  ctx.lineWidth = g.thickness;

  var sz = g.size;
  if(sz < 5) return;

  var ox = (g.offset_x||0) % sz;
  var oy = (g.offset_y||0) % sz;

  if(g.type === 'square'){
    ctx.beginPath();
    for(var x=ox; x<w; x+=sz){ctx.moveTo(x,0);ctx.lineTo(x,h)}
    for(var y=oy; y<h; y+=sz){ctx.moveTo(0,y);ctx.lineTo(w,y)}
    ctx.stroke();
  } else if(g.type === 'hex'){
    var hh=sz, vd=hh*1.5, hd=Math.sqrt(3)*hh/2;
    ctx.beginPath();
    for(var row=-1; row*vd+oy < h+hh; row++){
      for(var col=-1; col*hd+ox < w+hd; col++){
        var cx2 = col*hd + (row%2!==0 ? hd/2 : 0) + ox;
        var cy2 = row*vd + oy;
        for(var i=0;i<6;i++){
          var angle = (Math.PI/180)*(60*i-30);
          var px = cx2+(hh/2)*Math.cos(angle);
          var py = cy2+(hh/2)*Math.sin(angle);
          if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.closePath();
      }
    }
    ctx.stroke();
  }

  /* Calibration line */
  if(g.calibration_mode){
    var mx=w/2, my=h/2;
    ctx.strokeStyle='rgba(255,69,69,1)';
    ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(mx-250,my);ctx.lineTo(mx+250,my);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx-250,my-8);ctx.lineTo(mx-250,my+8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx+250,my-8);ctx.lineTo(mx+250,my+8);ctx.stroke();
  }
}

/* ═══════════════════════════════════════════════════════════════
   MEDIA PLAYBACK
   ═══════════════════════════════════════════════════════════════ */

var splashCanvas = document.getElementById('splash');
var splashCtx = splashCanvas.getContext('2d');
var gridCanvas = document.getElementById('grid-canvas');
var gridCtx = gridCanvas.getContext('2d');
var osCanvas = document.getElementById('overscan-canvas');
var osCtx = osCanvas.getContext('2d');
var mediaLayer = document.getElementById('media-layer');
var vidEl = document.getElementById('vid');
var imgEl = document.getElementById('img');
var connDot = document.getElementById('conn');

var isPlaying = false;
var splashAnim = null;

/* ─── Overscan drawing ─── */
function drawOverscan(){
  var os = overscanState;
  osCanvas.style.display = os.calibration ? 'block' : 'none';
  if(!os.calibration) return;

  /* Size the canvas buffer to exact physical pixels for crisp 1px lines.
     CSS keeps it at viewport size; the buffer matches the screen resolution. */
  var dpr = window.devicePixelRatio || 1;
  var w = Math.round(window.innerWidth * dpr);
  var h = Math.round(window.innerHeight * dpr);
  if(osCanvas.width !== w || osCanvas.height !== h){
    osCanvas.width = w;
    osCanvas.height = h;
    osCanvas.style.width = window.innerWidth + 'px';
    osCanvas.style.height = window.innerHeight + 'px';
  }
  osCtx.imageSmoothingEnabled = false;
  osCtx.clearRect(0, 0, w, h);

  var t = Math.round((os.top||0) * dpr);
  var b = Math.round((os.bottom||0) * dpr);
  var l = Math.round((os.left||0) * dpr);
  var r = Math.round((os.right||0) * dpr);

  /* For each side: red line at the overscan offset (should be hidden behind bezel),
     green line 1px inside that (should be the last visible pixel).
     Draw horizontal lines for top/bottom, vertical lines for left/right. */

  /* Top edge */
  osCtx.fillStyle='#ff0000';
  osCtx.fillRect(0, t, w, 1);
  osCtx.fillStyle='#00ff00';
  osCtx.fillRect(0, t+1, w, 1);

  /* Bottom edge */
  osCtx.fillStyle='#ff0000';
  osCtx.fillRect(0, h-1-b, w, 1);
  osCtx.fillStyle='#00ff00';
  osCtx.fillRect(0, h-2-b, w, 1);

  /* Left edge */
  osCtx.fillStyle='#ff0000';
  osCtx.fillRect(l, 0, 1, h);
  osCtx.fillStyle='#00ff00';
  osCtx.fillRect(l+1, 0, 1, h);

  /* Right edge */
  osCtx.fillStyle='#ff0000';
  osCtx.fillRect(w-1-r, 0, 1, h);
  osCtx.fillStyle='#00ff00';
  osCtx.fillRect(w-2-r, 0, 1, h);
}

function resize(){
  var w=window.innerWidth, h=window.innerHeight;
  splashCanvas.width=w; splashCanvas.height=h;
  gridCanvas.width=w; gridCanvas.height=h;
  drawGrid(gridCtx, w, h);
  drawOverscan();
  if(!isPlaying) drawSplash(splashCtx, w, h);
}
window.addEventListener('resize', resize);
resize();

function showSplash(){
  isPlaying = false;
  splashCanvas.style.display = 'block';
  mediaLayer.style.display = 'none';
  vidEl.pause(); vidEl.removeAttribute('src');
  imgEl.style.display = 'none'; imgEl.removeAttribute('src');
  if(!splashAnim) startSplashAnim();
}

function startSplashAnim(){
  function tick(){
    if(isPlaying){splashAnim=null; return}
    drawSplash(splashCtx, splashCanvas.width, splashCanvas.height);
    splashAnim = requestAnimationFrame(tick);
  }
  splashAnim = requestAnimationFrame(tick);
}

function hideSplash(){
  splashCanvas.style.display = 'none';
}

function playMedia(url, fileType){
  isPlaying = true;

  if(fileType === 'image'){
    vidEl.pause(); vidEl.style.display='none';
    imgEl.style.display = 'block';
    imgEl.onload = function(){ hideSplash(); imgEl.onload = null; };
    imgEl.src = url;
    mediaLayer.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
    vidEl.style.display = 'none';
    vidEl.src = url;
    var _safetyTimer = setTimeout(function(){
      _safetyTimer = null;
      vidEl.style.display = 'block';
      hideSplash();
    }, 500);
    vidEl.oncanplay = function(){
      clearTimeout(_safetyTimer);
      vidEl.style.display = 'block';
      hideSplash();
      vidEl.oncanplay = null;
    };
    vidEl.play().catch(function(){});
    mediaLayer.style.display = 'block';
  }
}

function setVideoVolume(level){
  vidEl.volume = Math.max(0, Math.min(1, level/100));
}

/* ═══════════════════════════════════════════════════════════════
   SERVER-SENT EVENTS (SSE)
   ═══════════════════════════════════════════════════════════════ */

var evtSource = null;

function connectSSE(){
  if(evtSource) evtSource.close();
  evtSource = new EventSource('/display/stream');

  evtSource.onopen = function(){
    connDot.classList.add('ok');
  };

  evtSource.onmessage = function(e){
    var msg;
    try{ msg = JSON.parse(e.data); } catch(err){ return; }
    handleEvent(msg);
  };

  evtSource.onerror = function(){
    connDot.classList.remove('ok');
    /* EventSource auto-reconnects */
  };
}

function handleEvent(msg){
  switch(msg.type){
    case 'init':
      gridState = msg.grid || gridState;
      if(msg.overscan) overscanState = msg.overscan;
      setVideoVolume(msg.volume != null ? msg.volume : 80);
      drawGrid(gridCtx, gridCanvas.width, gridCanvas.height);
      drawOverscan();
      if(msg.file && msg.file_path){
        var url = '/serve_media?path=' + encodeURIComponent(msg.file_path);
        playMedia(url, msg.file_type);
      } else {
        showSplash();
      }
      break;

    case 'play':
      playMedia(msg.url, msg.file_type);
      break;

    case 'stop':
      showSplash();
      break;

    case 'grid':
      gridState = msg.grid;
      drawGrid(gridCtx, gridCanvas.width, gridCanvas.height);
      break;

    case 'overscan':
      overscanState = msg.overscan;
      drawOverscan();
      break;

    case 'volume':
      setVideoVolume(msg.level);
      break;
  }
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */

startSplashAnim();
connectSSE();
</script>
